name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025  # SMTP
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and start mock OpenAI server
        run: |
          docker build -t mock_openai tests/utils/mock_openai/
          docker run -d -p 30000:30000 --name mock_openai_container mock_openai
          for i in $(seq 1 15); do
            curl -sf http://localhost:30000/v1/chat/completions -X POST -H "Content-Type: application/json" -d '{"messages":[]}' && break
            sleep 1
          done

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.4


      - name: Run Pytest
        env:
          ZOTERO_ID: "0"
          ZOTERO_KEY: "AbCdEfGhIjKlMnOpQrStUvWx"
          SENDER: "test@example.com"
          RECEIVER: "test@example.com"
          SENDER_PASSWORD: "test"
          OPENAI_API_KEY: "sk-xxx"
          OPENAI_API_BASE: "http://localhost:30000/v1"
        run: |
          uv run pytest